[build]
  builder = "nixpacks"

[[services]]
  name = "backend"
  source = "backend"

  [services.build]
  buildCommand = "pip install uv && uv pip install -r requirements.txt --system"

  [services.deploy]
    startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[[services]]
  name = "frontend"
  source = "frontend"

  [services.build]
    buildCommand = "npm install && npm run build"

  [services.deploy]
    startCommand = "npx serve dist -l $PORT"